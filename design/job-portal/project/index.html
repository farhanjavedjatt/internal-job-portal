<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font="inter" data-card="frost">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prism.work — jobs</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/jobs-data.js"></script>
</head>
<body>
<div id="root"></div>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accentHue": 159,
  "density": "spacious",
  "font": "space",
  "cardStyle": "liquid"
}/*EDITMODE-END*/;
</script>

<script type="text/babel" src="src/aurora.jsx"></script>
<script type="text/babel" src="src/scrubber.jsx"></script>
<script type="text/babel" src="src/sortwheel.jsx"></script>
<script type="text/babel" src="src/jobcard.jsx"></script>
<script type="text/babel" src="src/filter-rail.jsx"></script>
<script type="text/babel" src="src/detail.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script type="text/babel">
const { useState: useStateRoot, useEffect: useEffectRoot } = React;

function Root() {
  const [tweaks, setTweaks] = useStateRoot(() => {
    try {
      const saved = localStorage.getItem('prism-tweaks');
      if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) };
    } catch (e) {}
    return TWEAK_DEFAULTS;
  });

  useEffectRoot(() => {
    try { localStorage.setItem('prism-tweaks', JSON.stringify(tweaks)); } catch(e) {}
  }, [tweaks]);

  return <App tweaks={tweaks} setTweaks={setTweaks} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
